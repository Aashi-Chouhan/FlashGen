<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FlashGen</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0b0b;
  --card:#121212;
  --gold:#d4af37;
  --light-gold:#f5d77a;
  --text:#f5f5f5;
  --muted:#999;
  --radius:18px;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Outfit',sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* CENTER CONTAINER */
.wrap{
  width:100%;
  max-width:850px;
  padding:40px 20px;
}

/* HEADER */
.header{
  text-align:center;
  margin-bottom:50px;
}
.logo{
  font-family:'Playfair Display',serif;
  font-size:3.5rem;
  font-weight:600;
}
.logo span{color:var(--gold)}
.tagline{
  margin-top:10px;
  font-size:0.9rem;
  color:var(--muted);
}

/* SCREEN */
.screen{display:none}
.screen.active{display:block}

/* CARD STYLE */
.section{
  background:var(--card);
  padding:25px;
  border-radius:var(--radius);
  margin-bottom:25px;
  border:1px solid rgba(212,175,55,0.15);
}

.upload{
  /* border:2px solid rgba(212,175,55,0.25); */
  background:linear-gradient(145deg,#121212,#0e0e0e);
  align-content: center;
  padding:18px;
  text-align:center;
  border-radius:var(--radius);
  cursor:pointer;
  transition:0.3s;
}
.upload:hover{
  border-color:var(--light-gold);
  background:rgba(212,175,55,0.08);
}

input{display:none}

/* BUTTON */
button{
  padding:14px 26px;
  border:none;
  border-radius:12px;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

/* PRIMARY GOLD BUTTON */
.btn-main{
  background:var(--light-gold);
  color:black;
  width:100%;
  font-size:1rem;
}
.btn-main:hover{
  transform:scale(1.04);
}

/* MODE CARDS */
.mode{
  display:flex;
  gap:12px;
}
.mode div{
  flex:1;
  padding:18px;
  border:2px solid #333;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
}
.mode .active{
  border-color:var(--gold);
}

/* QUESTION */
.question{
  font-family:'Playfair Display',serif;
  font-size:2rem;
  margin-bottom:25px;
  text-align:center;
}

/* OPTIONS */
.options button{
  width:100%;
  margin-bottom:12px;
  background:#181818;
  border:2px solid rgba(245,215,122,0.4);
  color:var(--text);
  font-size:1rem;
  padding:14px;
}
.options button:hover{
  background:rgba(245,215,122,0.15);
}

/* NEXT BUTTON FIX */
.next-btn{
  margin-top:20px;
  width:100%;
  background:var(--light-gold);
  color:black;
  font-weight:600;
}

/* RESULT */
.result{
  text-align:center;
}
.result h1{
  font-size:4rem;
  color:var(--gold);
}
</style>
</head>

<body>

<div class="wrap">

<div class="header">
  <div class="logo">Flash<span>Gen</span></div>
  <div class="tagline">Turn PDFs into smart quizzes</div>
</div>

<!-- UPLOAD SCREEN -->
<div id="screen1" class="screen active">

<div class="section">
<label class="upload">
  <input type="file" id="file">
  Upload your PDF
</label>
</div>

<div class="section">
<div class="mode">
  <div onclick="setMode('flashcard')" id="m1" class="active">Flashcards</div>
  <div onclick="setMode('mcq')" id="m2">MCQ</div>
  <div onclick="setMode('fillblank')" id="m3">Fill</div>
</div>
</div>

<button class="btn-main" onclick="generate()">Generate</button>

</div>

<!-- QUIZ -->
<div id="screen2" class="screen">

<div class="section">
<div class="question" id="q"></div>
<div class="options" id="opts"></div>
<button class="next-btn" onclick="next()">Next</button>
</div>

</div>

<!-- RESULT -->
<div id="screen3" class="screen">

<div class="section result">
<h1 id="score">0%</h1>
<p id="stat"></p>

<button class="btn-main" onclick="location.reload()">Try Again</button>
</div>

</div>

</div>

<script>

let mode="flashcard";
let data=[];
let i=0;
let correct=0;

function setMode(m){
  mode=m;
  document.querySelectorAll('.mode div').forEach(x=>x.classList.remove('active'));
  document.getElementById(
    m==="flashcard"?"m1":m==="mcq"?"m2":"m3"
  ).classList.add('active');
}

async function generate(){
  const f=document.getElementById('file').files[0];
  if(!f)return alert("Upload PDF");

  const fd=new FormData();
  fd.append("pdf",f);
  fd.append("mode",mode);
  fd.append("count",10);

  const res=await fetch("/api/generate",{method:"POST",body:fd});
  const d=await res.json();

  data=d.cards;
  document.getElementById("screen1").classList.remove("active");
  document.getElementById("screen2").classList.add("active");

  show();
}

function show(){
  let c=data[i];
  document.getElementById("q").innerText=c.question||c.front;

  let html="";
  if(mode==="mcq"){
    c.options.forEach(o=>{
      html+=`<button onclick="check('${o}','${c.answer}')">${o}</button>`;
    });
  }else{
    html=`<button onclick="flip()">Reveal Answer</button>`;
  }

  document.getElementById("opts").innerHTML=html;
}

function check(o,a){
  if(o===a)correct++;
  next();
}

function next(){
  i++;
  if(i>=data.length){
    document.getElementById("screen2").classList.remove("active");
    document.getElementById("screen3").classList.add("active");

    let pct=Math.round((correct/data.length)*100);
    document.getElementById("score").innerText=pct+"%";
    document.getElementById("stat").innerText=`${correct}/${data.length} correct`;
  }else{
    show();
  }
}

</script>

</body>
